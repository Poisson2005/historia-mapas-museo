<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia de los Mapas</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            color: #333;
        }
        /* Interfaz de navegación */
        .navegacion {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e5ea;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            color: #007aff;
            background-color: #f2f2f7;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }
        .btn:active { background-color: #e5e5ea; }
        .btn.oculto { visibility: hidden; }

        /* Modo oscuro automático */
        @media (prefers-color-scheme: dark) {
            body { background-color: #1c1c1e; color: #f2f2f7; }
            .navegacion { border-top: 1px solid #38383a; }
            .btn { background-color: #2c2c2e; color: #0a84ff; }
            .btn:active { background-color: #3a3a3c; }
        }
    </style>
</head>
<body>
    <main id="contenido-mapa">
        <h1 id="titulo">Cargando...</h1>
        <p id="texto"></p>
    </main>

    <nav class="navegacion">
        <a href="#" id="btn-prev" class="btn">← Anterior</a>
        <a href="#" id="btn-next" class="btn">Siguiente →</a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
